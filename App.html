<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クラウド同期・単語帳アプリ</title>
    <!-- 必要なライブラリの読み込み -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK (Version 10+) -->
    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <!-- BabelでJSXをコンパイルしつつ、Firebaseモジュールを使用するメインスクリプト -->
    <script type="text/babel" data-type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "firebase/auth";
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc } from "firebase/firestore";

        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        // --- Icons ---
        const PlayIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
        const ListIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>;
        const FileTextIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>;

        // Firebase初期化のガード
        let app, auth, db;
        const configRaw = window.__firebase_config;
        const appId = window.__app_id || 'flashcard-app';

        if (configRaw && configRaw !== "") {
            const firebaseConfig = JSON.parse(configRaw);
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        }

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('learn');
            const [words, setWords] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                if (!auth) {
                    setLoading(false);
                    return;
                }
                const initAuth = async () => {
                    try { await signInAnonymously(auth); } catch (e) { console.error(e); }
                };
                initAuth();
                return onAuthStateChanged(auth, setUser);
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const wordsColRef = collection(db, 'artifacts', appId, 'users', user.uid, 'words');
                return onSnapshot(wordsColRef, (snap) => {
                    const data = [];
                    snap.forEach(doc => data.push(doc.data()));
                    setWords(data);
                    setLoading(false);
                }, (err) => {
                    console.error(err);
                    setLoading(false);
                });
            }, [user]);

            if (!configRaw) {
                return (
                    <div className="p-10 text-center">
                        <div className="bg-amber-50 border border-amber-200 p-4 rounded-xl text-amber-800">
                            Firebaseの設定が見つかりません。ローカルプレビューモード、または設定待ちです。
                        </div>
                    </div>
                );
            }

            if (loading) return <div className="p-10 text-center">読み込み中...</div>;

            return (
                <div className="min-h-screen bg-slate-50 pb-20">
                    <header className="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-10 shadow-sm">
                        <h1 className="text-indigo-600 font-bold flex items-center gap-2"><PlayIcon /> Flashcards</h1>
                        <nav className="flex gap-2">
                            <button onClick={() => setActiveTab('learn')} className={`p-2 rounded ${activeTab==='learn'?'bg-indigo-50 text-indigo-600':''}`}><PlayIcon /></button>
                            <button onClick={() => setActiveTab('words')} className={`p-2 rounded ${activeTab==='words'?'bg-indigo-50 text-indigo-600':''}`}><ListIcon /></button>
                            <button onClick={() => setActiveTab('data')} className={`p-2 rounded ${activeTab==='data'?'bg-indigo-50 text-indigo-600':''}`}><FileTextIcon /></button>
                        </nav>
                    </header>
                    
                    <main className="max-w-md mx-auto p-4 mt-4">
                        {activeTab === 'learn' && (
                            <div className="bg-white p-8 rounded-2xl shadow-sm text-center">
                                <h2 className="text-xl font-bold mb-4">学習を開始</h2>
                                <p className="text-slate-500 mb-6">対象単語: {words.length}個</p>
                                <button className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">開始する</button>
                            </div>
                        )}
                        {activeTab === 'words' && (
                            <div className="space-y-2">
                                {words.length === 0 ? (
                                    <p className="text-center text-slate-400">単語がありません</p>
                                ) : words.map(w => (
                                    <div key={w.id || Math.random()} className="bg-white p-4 rounded-xl border flex justify-between">
                                        <div><div className="font-bold">{w.en}</div><div className="text-sm text-slate-400">{w.ja}</div></div>
                                    </div>
                                ))}
                            </div>
                        )}
                        {activeTab === 'data' && (
                            <div className="bg-white p-6 rounded-xl border">
                                <h3 className="font-bold mb-4">データ管理</h3>
                                <p className="text-xs text-slate-400 mb-4">クラウド同期が有効です。ID: {user?.uid || '未ログイン'}</p>
                                <textarea placeholder="apple, りんご" className="w-full h-32 p-3 border rounded-lg mb-2 text-sm"></textarea>
                                <button className="w-full bg-slate-800 text-white py-2 rounded-lg text-sm">追加</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
