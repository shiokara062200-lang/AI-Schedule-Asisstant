<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIスケジュールアシスタント</title>
  
  <!-- Tailwind CSS の読み込み (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- ReactとLucide IconsをESM経由で読み込むためのImport Map設定 -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0"
      }
    }
  </script>
  
  <!-- Reactをブラウザ上で実行するためのBabel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Identity Services (カレンダー自動登録用) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- カスタムスタイル（アニメーション用） -->
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.3s ease-out forwards;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased">
  <!-- Reactの描画先 -->
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      CalendarPlus, Loader2, Send, Edit3, MapPin, AlignLeft, 
      Clock, Trash2, Settings, Plus, Info, Calendar, Check, 
      ExternalLink, ChevronDown, ChevronUp, Tag, Download, 
      Layers, AlertTriangle, ImagePlus, X, Image as ImageIcon,
      Share2, Copy, CheckCircle2, Cloud, UploadCloud, DownloadCloud, Key,
      LogIn, LogOut, CalendarCheck
    } from 'lucide-react';

    const App = () => {
      const [inputText, setInputText] = useState('');
      const [loading, setLoading] = useState(false);
      const [events, setEvents] = useState([]);
      const [error, setError] = useState('');
      
      // 画像アップロード用State
      const [imagePreview, setImagePreview] = useState(null);
      const [base64ImageData, setBase64ImageData] = useState(null);
      const [imageMimeType, setImageMimeType] = useState(null);
      const fileInputRef = useRef(null);
      
      // Gemini APIキーの初期化（ローカルストレージから）
      const [apiKey, setApiKey] = useState(() => {
        try {
          return localStorage.getItem('ai_calendar_gemini_api_key') || '';
        } catch (e) {
          return '';
        }
      });

      // Gemini モデル選択
      const [geminiModel, setGeminiModel] = useState(() => {
        try {
          return localStorage.getItem('ai_calendar_gemini_model') || 'gemini-2.0-flash';
        } catch (e) {
          return 'gemini-2.0-flash';
        }
      });
      const [availableModels, setAvailableModels] = useState([]);
      const [loadingModels, setLoadingModels] = useState(false);

      // Google OAuth クライアントIDの初期化
      const [googleClientId, setGoogleClientId] = useState(() => {
        try {
          return localStorage.getItem('ai_calendar_google_client_id') || '';
        } catch (e) {
          return '';
        }
      });
      const [accessToken, setAccessToken] = useState('');
      const [isAddingToCalendar, setIsAddingToCalendar] = useState(false);

      // テンプレートの初期化（ローカルストレージから）
      const [templates, setTemplates] = useState(() => {
        try {
          const saved = localStorage.getItem('ai_calendar_templates');
          return saved ? JSON.parse(saved) : [
            { id: 'tmpl-1', keyword: 'アルバイト', aliases: 'シフト, 勤務, 出勤, 稼働, レジ, work', startTime: '17:00', endTime: '22:00' },
            { id: 'tmpl-2', keyword: '1限の授業', aliases: '大学, 講義, 月曜1限, 教室, school', startTime: '09:00', endTime: '10:30' }
          ];
        } catch (e) {
          return [];
        }
      });

      const [forcedTemplateId, setForcedTemplateId] = useState('');
      const [showSettings, setShowSettings] = useState(false);
      
      const [newTemplate, setNewTemplate] = useState({ 
        keyword: '', aliases: '', startTime: '', endTime: '' 
      });

      // テンプレート共有用のState
      const [showShareTab, setShowShareTab] = useState(false);
      const [shareCode, setShareCode] = useState('');
      const [importCode, setImportCode] = useState('');
      const [copied, setCopied] = useState(false);

      // クラウド共有用のState
      const [cloudId, setCloudId] = useState('');
      const [inputCloudId, setInputCloudId] = useState('');
      const [isCloudSyncing, setIsCloudSyncing] = useState(false);
      const [shareMode, setShareMode] = useState('cloud'); // 'cloud' または 'manual'

      // APIキーおよびテンプレートが更新されたら自動的に保存
      useEffect(() => {
        localStorage.setItem('ai_calendar_gemini_api_key', apiKey);
      }, [apiKey]);

      useEffect(() => {
        localStorage.setItem('ai_calendar_gemini_model', geminiModel);
      }, [geminiModel]);

      useEffect(() => {
        localStorage.setItem('ai_calendar_google_client_id', googleClientId);
      }, [googleClientId]);

      useEffect(() => {
        localStorage.setItem('ai_calendar_templates', JSON.stringify(templates));
      }, [templates]);

      const addTemplate = () => {
        if (newTemplate.keyword && newTemplate.startTime && newTemplate.endTime) {
          setTemplates([...templates, { 
            ...newTemplate, 
            id: `tmpl-${Date.now()}` 
          }]);
          setNewTemplate({ keyword: '', aliases: '', startTime: '', endTime: '' });
        }
      };

      const removeTemplate = (id) => {
        setTemplates(templates.filter(t => t.id !== id));
        if (forcedTemplateId === id) setForcedTemplateId('');
      };

      // 手動共有コードの生成 (Base64エンコード)
      const generateShareCode = () => {
        const jsonStr = JSON.stringify(templates);
        const code = btoa(encodeURIComponent(jsonStr));
        setShareCode(code);
      };

      // クリップボードにコピー
      const copyToClipboard = () => {
        const textarea = document.createElement('textarea');
        textarea.value = shareCode;
        document.body.appendChild(textarea);
        textarea.select();
        try {
          document.execCommand('copy');
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        } catch (err) {
          console.error('コピーに失敗しました', err);
        }
        document.body.removeChild(textarea);
      };

      // 共有コードからテンプレートを読み込む
      const handleImport = () => {
        try {
          if (!importCode.trim()) return;
          const jsonStr = decodeURIComponent(atob(importCode.trim()));
          const parsed = JSON.parse(jsonStr);
          if (Array.isArray(parsed)) {
            const newTemplates = parsed.map(t => ({
              ...t, 
              id: `tmpl-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`
            }));
            setTemplates(prev => {
              const existingKeywords = new Set(prev.map(p => p.keyword));
              const filteredNew = newTemplates.filter(n => !existingKeywords.has(n.keyword));
              return [...prev, ...filteredNew];
            });
            setImportCode('');
            alert(`${parsed.length}件のテンプレートを正常に読み込みました！`);
          }
        } catch (e) {
          alert('無効な共有コードです。正しくコピーできているか確認してください。');
        }
      };

      // クラウド同期：テンプレートをアップロード
      const handleCloudUpload = async () => {
        if (templates.length === 0) {
          alert('共有するテンプレートがありません。');
          return;
        }
        setIsCloudSyncing(true);
        setCloudId('');
        try {
          const response = await fetch('https://api.npoint.io/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ templates: templates, updatedAt: new Date().toISOString() })
          });
          if (!response.ok) throw new Error('Upload failed');
          const data = await response.json();
          setCloudId(data.id);
        } catch (error) {
          console.error(error);
          alert('クラウドへの保存に失敗しました。時間をおいて再試行するか、手動共有を使用してください。');
        } finally {
          setIsCloudSyncing(false);
        }
      };

      // クラウド同期：IDからテンプレートをダウンロード
      const handleCloudDownload = async () => {
        if (!inputCloudId.trim()) return;
        setIsCloudSyncing(true);
        try {
          const response = await fetch(`https://api.npoint.io/${inputCloudId.trim()}`);
          if (!response.ok) throw new Error('Download failed');
          const data = await response.json();
          
          if (data && data.templates && Array.isArray(data.templates)) {
            const newTemplates = data.templates.map(t => ({
              ...t, 
              id: `tmpl-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`
            }));
            setTemplates(prev => {
              const existingKeywords = new Set(prev.map(p => p.keyword));
              const filteredNew = newTemplates.filter(n => !existingKeywords.has(n.keyword));
              return [...prev, ...filteredNew];
            });
            setInputCloudId('');
            alert(`${data.templates.length}件のテンプレートをクラウドから取得しました！`);
          } else {
            alert('有効なテンプレートデータが見つかりませんでした。');
          }
        } catch (error) {
          console.error(error);
          alert('取得に失敗しました。IDが間違っているか、データが存在しません。');
        } finally {
          setIsCloudSyncing(false);
        }
      };

      const loginToGoogle = (callback) => {
        if (!googleClientId) {
          alert("設定から「Google OAuth クライアントID」を入力してください。");
          setShowSettings(true);
          return;
        }
        
        try {
          const client = window.google.accounts.oauth2.initTokenClient({
            client_id: googleClientId,
            scope: 'https://www.googleapis.com/auth/calendar.events',
            callback: (response) => {
              if (response.error !== undefined) {
                console.error(response);
                alert('ログインに失敗しました。');
                return;
              }
              setAccessToken(response.access_token);
              if (callback) callback(response.access_token);
            },
          });
          client.requestAccessToken();
        } catch (e) {
          console.error(e);
          alert('Google認証モジュールの読み込みに失敗しました。');
        }
      };

      const formatEventForGoogleAPI = (evt) => {
        const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        const eventBody = {
          summary: evt.title,
          location: evt.location,
          description: evt.description,
        };

        if (evt.startTime && evt.endTime) {
          eventBody.start = { dateTime: `${evt.startDate}T${evt.startTime}:00`, timeZone };
          eventBody.end = { dateTime: `${evt.endDate || evt.startDate}T${evt.endTime}:00`, timeZone };
        } else {
          eventBody.start = { date: evt.startDate };
          const endDateObj = new Date(evt.endDate || evt.startDate);
          endDateObj.setDate(endDateObj.getDate() + 1);
          const nextDayStr = `${endDateObj.getFullYear()}-${String(endDateObj.getMonth() + 1).padStart(2, '0')}-${String(endDateObj.getDate()).padStart(2, '0')}`;
          eventBody.end = { date: nextDayStr };
        }
        return eventBody;
      };

      const insertEventToGoogleCalendar = async (evt, currentToken = accessToken) => {
        if (!currentToken) {
          loginToGoogle((token) => insertEventToGoogleCalendar(evt, token));
          return;
        }

        setIsAddingToCalendar(true);
        try {
          const eventBody = formatEventForGoogleAPI(evt);
          const res = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${currentToken}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(eventBody)
          });

          if (!res.ok) {
            if (res.status === 401) {
              setAccessToken('');
              alert('認証の期限が切れました。再度実行してください。');
              return;
            }
            throw new Error(`API Error: ${res.status}`);
          }
          
          alert(`「${evt.title}」をカレンダーに自動追加しました！`);
          removeEvent(evt.id); // 成功したらリストから消す
        } catch (e) {
          console.error(e);
          alert('追加に失敗しました。クライアントIDの設定やネットワークを確認してください。');
        } finally {
          setIsAddingToCalendar(false);
        }
      };

      const handleBatchInsertToGoogle = async () => {
        if (!accessToken) {
          loginToGoogle(handleBatchInsertToGoogle);
          return;
        }

        if (!window.confirm(`${events.length}件の予定をGoogleカレンダーに自動追加します。よろしいですか？`)) return;

        setIsAddingToCalendar(true);
        let successCount = 0;
        
        try {
          for (const evt of events) {
            const eventBody = formatEventForGoogleAPI(evt);
            const res = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${accessToken}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify(eventBody)
            });
            if (res.ok) successCount++;
            else console.error("Failed to add", evt.title);
          }
          
          if (successCount === events.length) {
            alert(`すべての予定（${successCount}件）を追加しました！`);
            setEvents([]);
          } else {
            alert(`${successCount}件追加されましたが、一部失敗しました。`);
          }
        } catch (e) {
          console.error(e);
          alert('追加中にエラーが発生しました。');
        } finally {
          setIsAddingToCalendar(false);
        }
      };

      const addEventFromTemplate = (template) => {
        const now = new Date();
        const today = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        
        const newEvent = {
          id: `evt-${Date.now()}`,
          title: template.keyword,
          startDate: today,
          startTime: template.startTime,
          endDate: today,
          endTime: template.endTime,
          location: '',
          description: `定型予定「${template.keyword}」から作成されました。`
        };
        setEvents(prev => [newEvent, ...prev]);
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) {
          setError('画像サイズは5MB以下にしてください。');
          return;
        }

        const previewUrl = URL.createObjectURL(file);
        setImagePreview(previewUrl);
        setImageMimeType(file.type);

        const reader = new FileReader();
        reader.onloadend = () => {
          const base64String = reader.result.split(',')[1];
          setBase64ImageData(base64String);
          setError('');
        };
        reader.readAsDataURL(file);
      };

      const removeImage = () => {
        if (imagePreview) URL.revokeObjectURL(imagePreview);
        setImagePreview(null);
        setBase64ImageData(null);
        setImageMimeType(null);
        if (fileInputRef.current) fileInputRef.current.value = '';
      };

      // AIを呼び出してメッセージ解析を行うメイン処理
      const extractEventData = async () => {
        if (!inputText.trim() && !base64ImageData) {
          setError('解析するメッセージを入力するか、画像を選択してください。');
          return;
        }

        setLoading(true);
        setError('');

        const effectiveApiKey = apiKey.trim();
        if (!effectiveApiKey) {
          setError('Gemini APIキーが設定されていません。設定パネルを開いてAPIキーを入力してください。');
          setShowSettings(true);
          setLoading(false);
          return;
        }
        // v1beta ですべてのモデルをサポート
        const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${geminiModel}:generateContent?key=${effectiveApiKey}`;
        const now = new Date();
        let templateInstruction = "";
        
        if (forcedTemplateId === 'none') {
          templateInstruction = `
【★重要指示★】
ユーザーは「テンプレートに存在しない新規の独立した予定」として解析することを明示的に指定しました。
登録されているどの定型予定（テンプレート）とも紐付けを行わないでください。既定の開始・終了時間を自動適用せず、必ずテキストに書かれている情報のみから抽出してください。`;
        } else {
          if (templates.length > 0) {
            const templateListStr = templates.map(t => {
              const aliasInfo = t.aliases ? ` (関連表現: ${t.aliases})` : '';
              return `- 【${t.keyword}】: ${t.startTime}〜${t.endTime}${aliasInfo}`;
            }).join('\n');
            
            templateInstruction = `
ユーザーは以下の定型予定（テンプレート）を登録しています。
【定型予定リスト】
${templateListStr}

【解析ルール】
テキスト内に定型予定のキーワード、またはその「関連表現（類義語）」が含まれており、かつ具体的な時間が明記されていない場合は、その予定に登録された標準的な時間を適用してください。`;
          }

          if (forcedTemplateId && forcedTemplateId !== 'none') {
            const forcedTmpl = templates.find(t => t.id === forcedTemplateId);
            if (forcedTmpl) {
              templateInstruction += `
\n【★最優先指示★】
ユーザーは、この入力テキストが「${forcedTmpl.keyword}」の予定であることを明示的に選択しました。テキスト内に「${forcedTmpl.keyword}」の記載がなくても、抽出結果のタイトルは「${forcedTmpl.keyword}」にし、時間情報が不足している場合はテンプレート時間（開始: ${forcedTmpl.startTime}、終了: ${forcedTmpl.endTime}）を適用してください。`;
            }
          }
        }

        const systemPrompt = `あなたは優秀なスケジュール管理アシスタントです。ユーザーが入力した自然言語や画像からスケジュールの情報を抽出し、JSON形式の配列で返してください。
現在の日時は ${now.toLocaleString('ja-JP')} です。「明日」などの日時はこれを基準に日付（YYYY-MM-DD）に変換してください。
複数の予定が含まれている場合はすべて抽出し、必ず配列（Array）として返してください。

${templateInstruction}

以下のJSONスキーマに従って厳密にJSON配列のみを出力してください（Markdown記号不要）。
[
  {
    "title": "予定のタイトル",
    "startDate": "YYYY-MM-DD",
    "startTime": "HH:MM (不明・非適用時は空文字)",
    "endDate": "YYYY-MM-DD",
    "endTime": "HH:MM",
    "location": "場所",
    "description": "詳細メモ"
  }
]`;

        const requestParts = [];
        // システムプロンプトを最初のユーザーメッセージに含める（すべてのAPIバージョンで動作）
        const fullPrompt = systemPrompt + "\n\n---\n" + (inputText.trim() || "この画像からスケジュールを抽出してください。");
        requestParts.push({ text: fullPrompt });

        if (base64ImageData) {
          requestParts.push({
            inlineData: { data: base64ImageData, mimeType: imageMimeType }
          });
        }

        const payload = {
          contents: [{ parts: requestParts }],
          generationConfig: { temperature: 0.2 }
        };

        try {
          let response;
          let errorDetail = '';
          const retries = 3;
          for (let i = 0; i < retries; i++) {
            try {
              response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });
              if (response.ok) break;
              
              // Try to get error details from response
              try {
                const errorBody = await response.clone().json();
                errorDetail = errorBody.error?.message || errorBody.error?.status || '';
              } catch (e) {
                errorDetail = `HTTP ${response.status}`;
              }
              
              if (i === retries - 1) {
                throw new Error(`API request failed: ${errorDetail}`);
              }
            } catch (err) {
              if (i === retries - 1) throw err;
            }
            await new Promise(res => setTimeout(res, Math.pow(2, i) * 1000));
          }

          const data = await response.json();
          let textResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
          
          // マークダウンのコードブロック（```json ... ```）を除去
          textResponse = textResponse.replace(/^```(?:json)?\s*([\s\S]*?)```$/m, '$1').trim();
          
          if (textResponse) {
            const parsedEvents = JSON.parse(textResponse);
            if (Array.isArray(parsedEvents)) {
              const eventsWithIds = parsedEvents.map(e => ({
                ...e, id: `evt-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`
              }));
              setEvents(prev => [...eventsWithIds, ...prev]);
              setInputText('');
              removeImage();
              setForcedTemplateId('');
            } else throw new Error('データが配列ではありません。');
          } else throw new Error('抽出に失敗しました。');
        } catch (err) {
          console.error(err);
          const errMsg = err.message || '不明なエラー';
          if (errMsg.includes('403')) {
            setError('APIキーが無効か、権限がありません。Google AI Studioで正しいAPIキーを発行し、設定に入力してください。');
          } else if (errMsg.includes('no longer available') || errMsg.includes('deprecated') || errMsg.includes('not found')) {
            // 使えないモデルの場合、既知の有効なモデルを順に試す
            const fallbacks = ['gemini-2.5-flash', 'gemini-2.0-flash', 'gemini-2.5-flash-lite', 'gemini-flash-latest'];
            let switched = false;
            for (const fb of fallbacks) {
              if (fb !== geminiModel && availableModels.includes(fb)) {
                setGeminiModel(fb);
                // 自動再試行のため、setTimeout後にextractEventDataを再度呼び出す
                setTimeout(() => {
                  setError(`「${geminiModel}」は利用できません。「${fb}」に自動切り替えしました。自動再試行中...`);
                  setLoading(true);
                  setTimeout(() => extractEventData(), 100);
                }, 100);
                switched = true;
                break;
              }
            }
            if (!switched) {
              setError(`「${geminiModel}」は利用できません。「確認」ボタンで一覧から別のモデルを選んでください。`);
            }
          } else if (errMsg.includes('currently') || errMsg.includes('temporary') || errMsg.includes('overloaded') || errMsg.includes('try again later')) {
            setError('このモデルが現在混雑しています。設定の「Gemini モデルの選択」で別のモデル（gemini-2.5-flash-lite など）に切り替えて再試行してください。');
          } else if (errMsg.includes('404')) {
            setError('APIエンドポイントが見つかりません。モデル名が正しいか確認してください。');
          } else if (errMsg.includes('429') || errMsg.includes('Quota exceeded') || errMsg.includes('quota')) {
            setError('【要対応】APIの利用枠の上限に達しました。Google AI Studio (https://aistudio.google.com/) で「Set up billing」をクリックして支払い設定を完了してください（クレジットカード登録が必要ですが、無料枠内であれば課金されません）。設定後、数分で利用できるようになります。');
          } else if (errMsg.includes('400')) {
            setError('リクエストが不正です。入力内容を確認して再度お試しください。');
          } else if (errMsg.includes('API key not found') || errMsg.includes('API_KEY_INVALID') || errMsg.includes('API key not valid')) {
            setError('APIキーが無効です。Google AI Studio (https://aistudio.google.com/apikey) で新しいAPIキーを発行し、設定に入力してください。現在のキーが正しくコピーできているかも確認してください。');
          } else {
            setError(`エラー: ${errMsg}`);
          }
        } finally {
          setLoading(false);
        }
      };

      const handleEventChange = (id, field, value) => {
        setEvents(events.map(evt => evt.id === id ? { ...evt, [field]: value } : evt));
      };

      const removeEvent = (id) => setEvents(events.filter(evt => evt.id !== id));
      const clearAllEvents = () => { if (window.confirm('すべてクリアしますか？')) setEvents([]); };

      const formatDateTimeForUrl = (dateStr, timeStr) => {
        if (!dateStr) return '';
        const datePart = dateStr.replace(/-/g, '');
        if (timeStr) return `${datePart}T${timeStr.replace(/:/g, '')}00`;
        return datePart;
      };

      const generateCalendarUrl = (event) => {
        const baseUrl = "https://calendar.google.com/calendar/render?action=TEMPLATE";
        const params = new URLSearchParams();
        if (event.title) params.append('text', event.title);
        if (event.location) params.append('location', event.location);
        if (event.description) params.append('details', event.description);

        const start = formatDateTimeForUrl(event.startDate, event.startTime);
        let end = formatDateTimeForUrl(event.endDate, event.endTime) || start;
        if (start) params.append('dates', `${start}/${end}`);
        return `${baseUrl}&${params.toString()}`;
      };

      const handleAddToCalendar = (event) => window.open(generateCalendarUrl(event), '_blank');

      const handleAllOpenTabs = () => {
        if (events.length === 0) return;
        if (window.confirm('全予定のタブを開きます。ポップアップを許可してください。')) {
          events.forEach(evt => window.open(generateCalendarUrl(evt), '_blank'));
        }
      };

      const handleDownloadICS = () => {
        if (events.length === 0) return;
        let icsContent = [
          "BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//AI Schedule Assistant//JP", 
          "CALSCALE:GREGORIAN", "METHOD:PUBLISH"
        ];

        events.forEach(evt => {
          const formatIcs = (d, t) => d ? (t ? `${d.replace(/-/g, '')}T${t.replace(/:/g, '')}00` : d.replace(/-/g, '')) : '';
          const start = formatIcs(evt.startDate, evt.startTime);
          const end = formatIcs(evt.endDate, evt.endTime) || start;
          const isAllDay = !evt.startTime;

          icsContent.push("BEGIN:VEVENT");
          icsContent.push(`UID:${Date.now()}-${Math.random().toString(36).substr(2, 9)}@aischedule`);
          icsContent.push(`DTSTAMP:${new Date().toISOString().replace(/[-:]/g, '').split('.')[0]}Z`);
          
          if (isAllDay) {
            icsContent.push(`DTSTART;VALUE=DATE:${start}`);
            const endD = new Date(evt.endDate || evt.startDate);
            endD.setDate(endD.getDate() + 1);
            icsContent.push(`DTEND;VALUE=DATE:${endD.getFullYear()}${String(endD.getMonth() + 1).padStart(2, '0')}${String(endD.getDate()).padStart(2, '0')}`);
          } else {
            icsContent.push(`DTSTART:${start}`);
            icsContent.push(`DTEND:${end}`);
          }

          const esc = (s) => s ? s.replace(/\\/g, '\\\\').replace(/;/g, '\\;').replace(/,/g, '\\,').replace(/\n/g, '\\n') : '';
          icsContent.push(`SUMMARY:${esc(evt.title)}`);
          if (evt.location) icsContent.push(`LOCATION:${esc(evt.location)}`);
          if (evt.description) icsContent.push(`DESCRIPTION:${esc(evt.description)}`);
          icsContent.push("END:VEVENT");
        });

        icsContent.push("END:VCALENDAR");
        const blob = new Blob([icsContent.join("\r\n")], { type: "text/calendar;charset=utf-8" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `schedule-${new Date().toISOString().slice(0,10)}.ics`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      return (
        <div className="min-h-screen flex flex-col items-center p-4 sm:p-6">
          <div className="w-full max-w-3xl bg-white rounded-2xl shadow-md border border-slate-200 overflow-hidden">
            
            <div className="bg-gradient-to-r from-blue-600 to-indigo-700 p-6 sm:p-8 text-white text-center">
              <div className="flex justify-center mb-3">
                <div className="bg-white/10 p-3 rounded-full backdrop-blur-sm">
                  <CalendarPlus size={42} className="text-white" />
                </div>
              </div>
              <h1 className="text-2xl sm:text-3xl font-bold tracking-tight">AIスケジュールアシスタント</h1>
              <p className="text-blue-100 text-sm mt-2">ブラウザで動くローカルAIスケジューラー</p>
            </div>

            <div className="p-4 sm:p-6 space-y-6">
              
              {/* Settings Section */}
              <div className="bg-slate-50 border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                <button 
                  onClick={() => setShowSettings(!showSettings)}
                  className="w-full flex items-center justify-between p-4 hover:bg-slate-100 transition-colors"
                >
                  <div className="flex items-center text-slate-700 font-semibold">
                    <Settings size={18} className="mr-2 text-slate-500" />
                    定型予定とAPIキー・共有の管理
                  </div>
                  <div className="text-blue-600 text-sm font-medium flex items-center gap-1">
                    {showSettings ? <>閉じる <ChevronUp size={16} /></> : <>管理を開く <ChevronDown size={16} /></>}
                  </div>
                </button>
                
                {showSettings && (
                  <div className="p-4 border-t border-slate-200 bg-white space-y-4">
                    {/* Gemini API Key Configuration */}
                    <div className="bg-amber-50 p-4 rounded-xl border border-amber-200 space-y-2">
                      <h4 className="text-xs font-bold text-amber-800 flex items-center gap-1">
                        <Key size={14} /> Gemini APIキーの設定 (安全にローカル保存されます)
                      </h4>
                      <p className="text-slate-600 text-xs">
                        Netlifyなどで一般公開して運用する場合はAPIキーを設定してください（プレビュー環境では空欄のままでも動作します）。
                      </p>
                      <input 
                        type="password"
                        value={apiKey}
                        onChange={e => setApiKey(e.target.value)}
                        placeholder="AI-zaSy... (ご自身のGemini APIキーを入力)"
                        className="w-full p-2 border border-slate-300 rounded-lg text-sm font-mono outline-none focus:ring-2 focus:ring-amber-500 bg-white"
                      />
                    </div>

                    {/* Gemini Model Selector */}
                    <div className="bg-purple-50 p-4 rounded-xl border border-purple-200 space-y-2">
                      <h4 className="text-xs font-bold text-purple-800 flex items-center gap-1">
                        <Layers size={14} /> Gemini モデルの選択
                      </h4>
                      <p className="text-slate-600 text-xs">
                        モデル名を選択または手動入力してください。「利用可能なモデルを確認」ボタンで現在のAPIキーで使えるモデル一覧を取得できます。
                      </p>
                      <div className="flex gap-2">
                        <select
                          value={geminiModel}
                          onChange={e => {
                            const val = e.target.value;
                            if (val !== '__custom__') setGeminiModel(val);
                          }}
                          className="flex-1 p-2 border border-slate-300 rounded-lg text-sm font-mono outline-none focus:ring-2 focus:ring-purple-500 bg-white"
                        >
                          <option value="gemini-2.0-flash">gemini-2.0-flash</option>
                          <option value="gemini-2.0-flash-lite">gemini-2.0-flash-lite</option>
                          <option value="gemini-1.5-flash">gemini-1.5-flash</option>
                          <option value="gemini-1.5-flash-8b">gemini-1.5-flash-8b</option>
                          <option value="gemini-1.5-pro">gemini-1.5-pro</option>
                          <option value="gemini-2.5-flash-preview-09-2025">gemini-2.5-flash-preview</option>
                          <option value="__custom__">✏️ 手動入力...</option>
                        </select>
                        <button
                          onClick={async () => {
                            const key = apiKey.trim();
                            if (!key) { setError('先にAPIキーを入力してください'); return; }
                            setLoadingModels(true);
                            try {
                              const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                              const data = await res.json();
                              if (data.models) {
                                const names = data.models
                                  .filter(m => m.supportedGenerationMethods?.includes('generateContent'))
                                  .map(m => m.name.replace('models/', ''));
                                setAvailableModels(names);
                              } else {
                                setAvailableModels(['取得エラー: ' + (data.error?.message || JSON.stringify(data))]);
                              }
                            } catch(e) {
                              setAvailableModels(['API接続エラー: ' + e.message]);
                            } finally {
                              setLoadingModels(false);
                            }
                          }}
                          className="bg-purple-600 hover:bg-purple-700 text-white px-3 py-1 rounded-lg text-xs font-bold transition-colors shadow-sm whitespace-nowrap"
                        >
                          {loadingModels ? '読み込み中...' : '確認'}
                        </button>
                      </div>
                      <input
                        type="text"
                        value={geminiModel}
                        onChange={e => setGeminiModel(e.target.value)}
                        placeholder="モデル名を直接入力 (例: gemini-1.5-pro)"
                        className="w-full p-2 border border-slate-300 rounded-lg text-sm font-mono outline-none focus:ring-2 focus:ring-purple-500 bg-white"
                      />
                      {availableModels.length > 0 && (
                        <div className="bg-white border border-purple-200 rounded-lg p-2 max-h-32 overflow-y-auto text-xs font-mono text-slate-700">
                          <div className="font-bold text-purple-700 mb-1">利用可能なモデル:</div>
                          {availableModels.map((m, i) => (
                            <button
                              key={i}
                              onClick={() => setGeminiModel(m)}
                              className={`block w-full text-left px-2 py-1 rounded hover:bg-purple-100 transition-colors ${geminiModel === m ? 'bg-purple-200 font-bold' : ''}`}
                            >
                              {m}
                            </button>
                          ))}
                        </div>
                      )}
                    </div>

                    {/* Google OAuth Client ID Configuration */}
                    <div className="bg-blue-50 p-4 rounded-xl border border-blue-200 space-y-2 mt-2">
                      <h4 className="text-xs font-bold text-blue-800 flex items-center gap-1">
                        <CalendarCheck size={14} /> Google OAuth クライアントID (自動追加用)
                      </h4>
                      <p className="text-slate-600 text-[10px] sm:text-xs">
                        アプリからGoogleカレンダーへ直接予定を追加するために必要です。Google Cloud Consoleで「Webアプリケーション」のクライアントIDを発行して入力してください。
                      </p>
                      <div className="flex gap-2">
                        <input 
                          type="text"
                          value={googleClientId}
                          onChange={e => setGoogleClientId(e.target.value)}
                          placeholder="xxx-yyy.apps.googleusercontent.com"
                          className="flex-1 p-2 border border-slate-300 rounded-lg text-sm font-mono outline-none focus:ring-2 focus:ring-blue-500 bg-white"
                        />
                        {accessToken ? (
                          <button onClick={() => setAccessToken('')} className="bg-slate-200 hover:bg-slate-300 text-slate-700 px-3 py-1 rounded-lg text-xs font-bold transition-colors flex items-center gap-1 whitespace-nowrap">
                            <LogOut size={12}/> 連携解除
                          </button>
                        ) : (
                          <button onClick={() => loginToGoogle()} className="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded-lg text-xs font-bold transition-colors flex items-center gap-1 whitespace-nowrap shadow-sm">
                            <LogIn size={12}/> 連携テスト
                          </button>
                        )}
                      </div>
                    </div>

                    {/* Template List */}
                    <div className="flex flex-wrap gap-2 pt-2">
                      {templates.map(t => (
                        <div key={t.id} className="flex flex-col bg-slate-50 border border-slate-200 rounded-lg p-3 text-xs sm:text-sm flex-1 min-w-[200px]">
                          <div className="flex justify-between items-start">
                            <span className="font-bold text-slate-800">{t.keyword}</span>
                            <button onClick={() => removeTemplate(t.id)} className="text-slate-400 hover:text-red-500"><Trash2 size={15}/></button>
                          </div>
                          <div className="text-slate-500 font-mono mt-1 text-xs">{t.startTime} 〜 {t.endTime}</div>
                          {t.aliases && <div className="text-slate-400 mt-1 flex items-center gap-1"><Tag size={10} /><span className="truncate max-w-[150px]">類義語: {t.aliases}</span></div>}
                        </div>
                      ))}
                    </div>

                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 mt-2">
                      <h4 className="text-xs font-bold text-slate-700 mb-2">新規テンプレート追加</h4>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
                        <input type="text" value={newTemplate.keyword} onChange={e => setNewTemplate({...newTemplate, keyword: e.target.value})} className="w-full p-2 border border-slate-300 rounded outline-none text-sm" placeholder="タイトル (例: バイト) *" />
                        <input type="text" value={newTemplate.aliases} onChange={e => setNewTemplate({...newTemplate, aliases: e.target.value})} className="w-full p-2 border border-slate-300 rounded outline-none text-sm" placeholder="関連語 (例: 出勤, シフト)" />
                      </div>
                      <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 items-end">
                        <input type="time" value={newTemplate.startTime} onChange={e => setNewTemplate({...newTemplate, startTime: e.target.value})} className="w-full p-2 border border-slate-300 rounded outline-none text-sm" />
                        <input type="time" value={newTemplate.endTime} onChange={e => setNewTemplate({...newTemplate, endTime: e.target.value})} className="w-full p-2 border border-slate-300 rounded outline-none text-sm" />
                        <button onClick={addTemplate} disabled={!newTemplate.keyword || !newTemplate.startTime || !newTemplate.endTime} className="w-full py-2 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm font-semibold disabled:opacity-50 col-span-2 sm:col-span-1">追加</button>
                      </div>
                    </div>

                    {/* Shared Panel for Export and Import */}
                    <div className="mt-4 border-t border-slate-200 pt-4">
                      <button 
                        onClick={() => setShowShareTab(!showShareTab)}
                        className="flex items-center gap-2 text-sm font-bold text-slate-700 hover:text-blue-600 transition-colors"
                      >
                        <Share2 size={16} />
                        他の端末とテンプレートを共有する (クラウド & 手動)
                        {showShareTab ? <ChevronUp size={14} /> : <ChevronDown size={14} />}
                      </button>
                      
                      {showShareTab && (
                        <div className="mt-3 space-y-4 animate-fade-in">
                          
                          {/* Tabs for Cloud or Manual Sharing */}
                          <div className="flex bg-slate-200 p-1 rounded-lg w-full max-w-sm">
                            <button onClick={() => setShareMode('cloud')} className={`flex-1 text-xs font-bold py-2 rounded-md flex justify-center items-center gap-1.5 transition-all ${shareMode === 'cloud' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}>
                              <Cloud size={16}/> クラウド共有 (おすすめ)
                            </button>
                            <button onClick={() => setShareMode('manual')} className={`flex-1 text-xs font-bold py-2 rounded-md flex justify-center items-center gap-1.5 transition-all ${shareMode === 'manual' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}>
                              <Share2 size={16}/> 手動共有
                            </button>
                          </div>

                          {shareMode === 'cloud' ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 animate-fade-in">
                              <div className="bg-blue-50 p-4 rounded-lg border border-blue-100 shadow-sm">
                                <h5 className="text-xs font-bold text-blue-800 mb-2 flex items-center gap-1.5"><UploadCloud size={16}/> ① クラウドにアップロード</h5>
                                <p className="text-[10px] text-slate-600 mb-3">現在のテンプレートをクラウドに一次保存し、短い共有IDを発行します。</p>
                                <button onClick={handleCloudUpload} disabled={isCloudSyncing} className="w-full bg-blue-600 hover:bg-blue-700 text-white text-xs py-2.5 rounded-lg font-bold transition-colors mb-2 disabled:opacity-50 flex justify-center items-center gap-1.5 shadow-sm">
                                  {isCloudSyncing ? <Loader2 size={14} className="animate-spin"/> : null} 共有IDを発行する
                                </button>
                                {cloudId && (
                                  <div className="mt-3 text-center bg-white p-3 border border-blue-200 rounded-lg shadow-inner">
                                    <div className="text-[10px] font-bold text-slate-500 mb-1">共有ID (他端末で入力)</div>
                                    <div className="text-lg font-mono font-black tracking-widest text-blue-700 select-all cursor-text">{cloudId}</div>
                                  </div>
                                )}
                              </div>

                              <div className="bg-emerald-50 p-4 rounded-lg border border-emerald-100 shadow-sm">
                                <h5 className="text-xs font-bold text-emerald-800 mb-2 flex items-center gap-1.5"><DownloadCloud size={16}/> ② クラウドからダウンロード</h5>
                                <p className="text-[10px] text-slate-600 mb-3">別の端末で発行された共有IDを入力してテンプレートを取り込みます。</p>
                                <input 
                                  type="text" 
                                  value={inputCloudId} 
                                  onChange={e => setInputCloudId(e.target.value)} 
                                  placeholder="共有IDを入力 (例: a1b2c3d4...)" 
                                  className="w-full p-2.5 border border-emerald-200 rounded-lg font-mono text-center text-sm outline-none mb-3 focus:ring-2 focus:ring-emerald-500" 
                                />
                                <button onClick={handleCloudDownload} disabled={!inputCloudId || isCloudSyncing} className="w-full bg-emerald-600 hover:bg-emerald-700 disabled:opacity-50 text-white text-xs py-2.5 rounded-lg font-bold flex items-center justify-center gap-1.5 shadow-sm">
                                  {isCloudSyncing ? <Loader2 size={14} className="animate-spin"/> : <Download size={14} />} 読み込んで追加
                                </button>
                              </div>
                            </div>
                          ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 animate-fade-in">
                              <div className="bg-slate-50 p-3 rounded-lg border border-slate-200">
                                <h5 className="text-xs font-bold text-slate-800 mb-2">① エクスポート (コード作成)</h5>
                                <button onClick={generateShareCode} className="w-full bg-white border border-slate-300 hover:bg-slate-100 text-slate-700 text-xs py-2 rounded font-bold transition-colors mb-2 shadow-sm">
                                  共有コードを生成する
                                </button>
                                {shareCode && (
                                  <div className="relative mt-2">
                                    <textarea readOnly value={shareCode} className="w-full h-16 text-[10px] p-2 border border-slate-200 rounded font-mono text-slate-600 outline-none resize-none" />
                                    <button onClick={copyToClipboard} className="absolute top-2 right-2 bg-slate-800 hover:bg-slate-700 text-white px-2 py-1 rounded flex items-center gap-1 text-[10px] shadow">
                                      {copied ? <CheckCircle2 size={12} className="text-green-400" /> : <Copy size={12} />}
                                      {copied ? 'コピー済' : 'コピー'}
                                    </button>
                                  </div>
                                )}
                              </div>

                              <div className="bg-slate-50 p-3 rounded-lg border border-slate-200">
                                <h5 className="text-xs font-bold text-slate-800 mb-2">② インポート (貼り付け)</h5>
                                <textarea value={importCode} onChange={(e) => setImportCode(e.target.value)} placeholder="ここにコピーした共有コードを貼り付け" className="w-full h-16 text-[10px] p-2 border border-slate-200 rounded font-mono text-slate-600 outline-none resize-none mb-2 focus:ring-2 focus:ring-blue-500" />
                                <button onClick={handleImport} disabled={!importCode} className="w-full bg-slate-800 hover:bg-slate-700 disabled:opacity-50 text-white text-xs py-2 rounded font-bold flex items-center justify-center gap-1 shadow-sm">
                                  <Download size={14} /> 読み込んで追加
                                </button>
                              </div>
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </div>

              {/* Quick Add Buttons */}
              {templates.length > 0 && (
                 <div className="flex flex-wrap items-center gap-2 bg-white p-3 rounded-xl border border-slate-200 shadow-sm">
                   <span className="text-xs font-bold text-slate-500 mr-1 flex items-center gap-1">
                     <Calendar size={14} /> 今日に追加:
                   </span>
                   {templates.map(t => (
                     <button 
                       key={`quick-${t.id}`}
                       onClick={() => addEventFromTemplate(t)}
                       className="text-xs bg-slate-50 hover:bg-blue-50 hover:text-blue-600 border border-slate-200 hover:border-blue-200 text-slate-700 py-1.5 px-3 rounded-full transition-all flex items-center shadow-sm"
                       title={`本日の日付で「${t.keyword}」の予定枠を直接追加します`}
                     >
                       <Plus size={12} className="mr-1 text-slate-400" />
                       {t.keyword}
                     </button>
                   ))}
                 </div>
              )}

              {/* Input Panel */}
              <div className="space-y-4 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                <div>
                  <label className="block text-sm font-semibold text-slate-700 mb-2">
                    予定を含むメール文やチャット、画像を入力
                  </label>
                  
                  <div className="relative">
                    <textarea
                      className={`w-full p-3.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none text-slate-700 leading-relaxed text-sm outline-none shadow-inner transition-all ${imagePreview ? 'h-48 pb-20' : 'h-36'}`}
                      placeholder="例: 明日の夕方5時から2時間、出勤になりました！また、来週水曜日の午前10時からは新宿本社でミーティングがあります。"
                      value={inputText}
                      onChange={(e) => setInputText(e.target.value)}
                    />
                    
                    {/* Image Preview Overlay */}
                    {imagePreview && (
                      <div className="absolute bottom-3 left-3 bg-white p-1.5 rounded-lg border border-slate-200 shadow-sm flex items-center gap-3 max-w-[calc(100%-24px)] animate-fade-in">
                        <div className="relative h-14 w-14 sm:h-16 sm:w-16 shrink-0 rounded bg-slate-100 overflow-hidden border border-slate-200">
                          <img src={imagePreview} alt="アップロードプレビュー" className="object-cover w-full h-full" />
                        </div>
                        <div className="flex flex-col flex-1 min-w-0 pr-2">
                          <span className="text-xs font-semibold text-slate-700 truncate flex items-center gap-1">
                            <ImageIcon size={14} className="text-blue-500" /> 画像が添付されています
                          </span>
                          <span className="text-[10px] text-slate-500 truncate mt-0.5">上記テキストで補足情報を追加することも可能です</span>
                        </div>
                        <button 
                          onClick={removeImage}
                          className="bg-slate-100 hover:bg-red-50 text-slate-500 hover:text-red-500 p-1.5 rounded-full transition-colors shrink-0 mr-1"
                          title="画像を削除"
                        >
                          <X size={16} />
                        </button>
                      </div>
                    )}
                  </div>

                  {/* Image Upload Button */}
                  <div className="flex justify-end mt-2">
                    <input 
                      type="file" 
                      accept="image/png, image/jpeg, image/webp" 
                      className="hidden" 
                      ref={fileInputRef}
                      onChange={handleImageUpload}
                    />
                    <button 
                      onClick={() => fileInputRef.current?.click()}
                      className="text-xs bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-600 py-2 px-3 rounded-lg transition-all flex items-center shadow-sm font-medium"
                    >
                      <ImagePlus size={16} className="mr-1.5 text-blue-500" />
                      {imagePreview ? '別の画像に変更' : 'チラシなどの画像を添付'}
                    </button>
                  </div>
                </div>

                {/* Targeted Template Selector */}
                <div className="bg-blue-50/50 border border-blue-100 p-3.5 rounded-lg flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                  <div className="space-y-0.5">
                    <span className="text-xs font-bold text-blue-800 flex items-center gap-1">
                      💡 解析する予定の種類の指定 (任意)
                    </span>
                    <p className="text-[11px] text-slate-600">
                      特定のテンプレに当てはめたいか、逆にテンプレ時間を一切使わないかを指定できます。
                    </p>
                  </div>
                  <div className="min-w-[200px]">
                    <select 
                      value={forcedTemplateId}
                      onChange={(e) => setForcedTemplateId(e.target.value)}
                      className="w-full p-2 bg-white border border-slate-300 rounded-lg text-xs font-semibold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500 shadow-sm"
                    >
                      <option value="">🔮 自動判別 (文脈から推測)</option>
                      <option value="none">🚫 テンプレート不使用 (完全新規予定として作成)</option>
                      {templates.length > 0 && (
                        <optgroup label="── 登録済みの定型予定 ──">
                          {templates.map(t => (
                            <option key={`select-${t.id}`} value={t.id}>
                              🎯 {t.keyword} ({t.startTime}〜)
                            </option>
                          ))}
                        </optgroup>
                      )}
                    </select>
                  </div>
                </div>

                <button
                  onClick={extractEventData}
                  disabled={loading || (!inputText.trim() && !base64ImageData)}
                  className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl transition duration-200 flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed shadow-md text-base"
                >
                  {loading ? (
                    <>
                      <Loader2 className="animate-spin mr-2" size={20} />
                      AIがメッセージを解析して予定抽出中...
                    </>
                  ) : (
                    <>
                      <Send className="mr-2" size={18} />
                      解析してカレンダー登録用のカードを生成する
                    </>
                  )}
                </button>
                {error && <p className="text-red-500 text-xs mt-1 text-center font-medium px-4">{error}</p>}
              </div>

              {/* Extracted Events list Section */}
              {events.length > 0 && (
                <div className="space-y-4 pt-4 border-t border-slate-200 animate-fade-in">
                  <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                    <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                      <Check className="text-green-500 border border-green-200 rounded-full p-0.5" size={22} />
                      カレンダー登録待ちの予定 ({events.length}件)
                    </h2>
                    
                    {/* Clear All Button */}
                    <button 
                      onClick={clearAllEvents}
                      className="text-xs text-slate-400 hover:text-red-500 transition-colors flex items-center gap-1 font-medium self-end sm:self-auto"
                    >
                      <Trash2 size={14} />
                      すべてクリア
                    </button>
                  </div>

                  {/* Batch Actions Box */}
                  {events.length > 1 && (
                    <div className="bg-emerald-50/50 border border-emerald-100 p-4 rounded-xl space-y-3">
                      <div className="flex items-center gap-2 text-emerald-800 font-bold text-sm">
                        <Layers size={18} />
                        <span>複数予定の一括登録アクション</span>
                      </div>
                      <p className="text-xs text-slate-600 leading-relaxed">
                        複数の予定が抽出されました！個別に登録するか、以下の「一括登録用ファイル」をダウンロードしてGoogleカレンダーの設定から読み込ませるのが最も簡単でオススメです。
                      </p>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 pt-1">
                        <button
                          onClick={handleBatchInsertToGoogle}
                          disabled={isAddingToCalendar}
                          className="flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white py-2.5 px-4 rounded-lg font-bold text-xs transition-colors shadow-sm col-span-1 sm:col-span-2"
                        >
                          {isAddingToCalendar ? <Loader2 size={15} className="animate-spin"/> : <CalendarCheck size={15} />}
                          Googleカレンダーにすべて自動追加する (推奨)
                        </button>
                        <button
                          onClick={handleDownloadICS}
                          className="flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white py-2.5 px-4 rounded-lg font-bold text-xs transition-colors shadow-sm"
                        >
                          <Download size={15} />
                          一括登録用ファイルの保存 (.ics)
                        </button>
                        <button
                          onClick={handleAllOpenTabs}
                          className="flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 text-white py-2.5 px-4 rounded-lg font-bold text-xs transition-colors shadow-sm"
                        >
                          <ExternalLink size={15} />
                          別タブで開いて登録
                        </button>
                      </div>
                      <div className="flex items-start gap-1.5 text-[10px] text-slate-400 mt-1">
                        <AlertTriangle size={12} className="shrink-0 mt-0.5 text-amber-500" />
                        <span>※「まとめて開く」場合、ブラウザの設定でポップアップの許可を求められることがあります。一度に10件以上ある場合は「.icsファイル保存」を推奨します。</span>
                      </div>
                    </div>
                  )}

                  <div className="space-y-4 max-h-[500px] overflow-y-auto pr-1">
                    {events.map((evt, idx) => (
                      <div key={evt.id} className="bg-slate-50 border border-slate-200 rounded-xl p-4 shadow-sm space-y-3 relative hover:border-slate-300 transition-colors">
                        
                        {/* Event Card Header */}
                        <div className="flex justify-between items-center pb-2 border-b border-slate-200">
                          <span className="text-xs font-bold text-slate-400 bg-slate-200 px-2 py-0.5 rounded-full">
                            予定 #{idx + 1}
                          </span>
                          <button 
                            onClick={() => removeEvent(evt.id)}
                            className="text-slate-400 hover:text-red-500 transition-colors p-1"
                            title="この予定を削除"
                          >
                            <Trash2 size={16} />
                          </button>
                        </div>

                        {/* Event Editor Form */}
                        <div className="grid grid-cols-1 gap-3 text-xs sm:text-sm">
                          <div>
                            <label className="block text-xs font-semibold text-slate-500 mb-1">タイトル</label>
                            <input
                              type="text"
                              value={evt.title}
                              onChange={(e) => handleEventChange(evt.id, 'title', e.target.value)}
                              className="w-full p-2 border border-slate-300 rounded-lg text-slate-800 focus:ring-1 focus:ring-blue-500 font-medium"
                              placeholder="予定の名称"
                            />
                          </div>

                          <div className="grid grid-cols-2 gap-3">
                            <div>
                              <label className="block text-xs font-semibold text-slate-500 mb-1">開始日</label>
                              <input
                                type="date"
                                value={evt.startDate}
                                onChange={(e) => handleEventChange(evt.id, 'startDate', e.target.value)}
                                className="w-full p-2 border border-slate-300 rounded-lg text-slate-800 focus:ring-1 focus:ring-blue-500"
                              />
                            </div>
                            <div>
                              <label className="block text-xs font-semibold text-slate-500 mb-1">開始時間</label>
                              <div className="relative">
                                <Clock className="absolute left-2.5 top-2.5 text-slate-400" size={14} />
                                <input
                                  type="time"
                                  value={evt.startTime}
                                  onChange={(e) => handleEventChange(evt.id, 'startTime', e.target.value)}
                                  className="w-full p-2 pl-8 border border-slate-300 rounded-lg text-slate-800 focus:ring-1 focus:ring-blue-500"
                                />
                              </div>
                            </div>
                          </div>

                          <div className="grid grid-cols-2 gap-3">
                            <div>
                              <label className="block text-xs font-semibold text-slate-500 mb-1">終了日</label>
                              <input
                                type="date"
                                value={evt.endDate}
                                onChange={(e) => handleEventChange(evt.id, 'endDate', e.target.value)}
                                className="w-full p-2 border border-slate-300 rounded-lg text-slate-800 focus:ring-1 focus:ring-blue-500"
                              />
                            </div>
                            <div>
                              <label className="block text-xs font-semibold text-slate-500 mb-1">終了時間</label>
                              <div className="relative">
                                <Clock className="absolute left-2.5 top-2.5 text-slate-400" size={14} />
                                <input
                                  type="time"
                                  value={evt.endTime}
                                  onChange={(e) => handleEventChange(evt.id, 'endTime', e.target.value)}
                                  className="w-full p-2 pl-8 border border-slate-300 rounded-lg text-slate-800 focus:ring-1 focus:ring-blue-500"
                                />
                              </div>
                            </div>
                          </div>

                          <div>
                            <label className="block text-xs font-semibold text-slate-500 mb-1">場所</label>
                            <div className="relative">
                              <MapPin className="absolute left-2.5 top-2.5 text-slate-400" size={14} />
                              <input
                                type="text"
                                value={evt.location}
                                onChange={(e) => handleEventChange(evt.id, 'location', e.target.value)}
                                className="w-full p-2 pl-8 border border-slate-300 rounded-lg text-slate-800 focus:ring-1 focus:ring-blue-500"
                                placeholder="オフィス、会議室、住所など"
                              />
                            </div>
                          </div>

                          <div>
                            <label className="block text-xs font-semibold text-slate-500 mb-1">詳細（メモ）</label>
                            <div className="relative">
                              <AlignLeft className="absolute left-2.5 top-2.5 text-slate-400" size={14} />
                              <textarea
                                value={evt.description}
                                onChange={(e) => handleEventChange(evt.id, 'description', e.target.value)}
                                className="w-full p-2 pl-8 border border-slate-300 rounded-lg text-slate-800 focus:ring-1 focus:ring-blue-500 h-16 resize-none text-xs"
                                placeholder="メモを追加"
                              />
                            </div>
                          </div>
                        </div>

                        {/* Action buttons on Card */}
                        <div className="pt-2 flex flex-col gap-2">
                          <button
                            onClick={() => insertEventToGoogleCalendar(evt)}
                            disabled={isAddingToCalendar}
                            className="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white font-bold py-2.5 px-4 rounded-xl transition duration-150 flex items-center justify-center shadow-sm gap-1.5 text-sm"
                          >
                            {isAddingToCalendar ? <Loader2 size={18} className="animate-spin"/> : <CalendarCheck size={18} />}
                            カレンダーに自動追加
                          </button>
                          <button
                            onClick={() => handleAddToCalendar(evt)}
                            className="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-2 px-4 rounded-xl transition duration-150 flex items-center justify-center gap-1.5 text-xs"
                          >
                            <ExternalLink size={14} />
                            手動で確認ページを開く
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    // Reactアプリのレンダリング
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
